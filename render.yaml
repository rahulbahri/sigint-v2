services:
  - type: web
    name: axiom-intelligence-v2
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PIP_PREFER_BINARY
        value: "1"
